apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: bugsense
  labels:
    app: chromadb
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
        tier: database
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ANONYMIZED_TELEMETRY
              value: "False"
            - name: PERSIST_DIRECTORY
              value: /chroma/chroma
          volumeMounts:
            - name: chromadb-storage
              mountPath: /chroma/chroma
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
      volumes:
        - name: chromadb-storage
          persistentVolumeClaim:
            claimName: chromadb-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: chromadb-service
  namespace: bugsense
  labels:
    app: chromadb
spec:
  type: ClusterIP
  selector:
    app: chromadb
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
